[build]
command = "pnpm run build"
publish = ".output/public"

[build.environment]
NODE_VERSION = "24"

# Vite content-hashed bundles, fonts and prebuilt images — safe to cache forever.
[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# The service worker must always revalidate so new deploys take over promptly.
[[headers]]
for = "/sw.js"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
